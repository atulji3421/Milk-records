<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fulvariya Doodh</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
  <header>Fulvariya Doodh</header>
  <div class="content">
    <div class="form-group">
      <label>Customer Name:</label>
      <input type="text" id="cName" placeholder="Enter name">
    </div>
    <div class="form-group">
      <label>Phone Number:</label>
      <input type="tel" id="cPhone" placeholder="Enter phone">
    </div>
    <div class="form-group">
      <label>Location:</label>
      <input type="text" id="cLocation" placeholder="Enter location">
    </div>
    <div class="form-group">
      <label>Milk Quantity (ml or liters):</label>
      <input type="number" id="mMilk" min="100" max="100000" placeholder="100 to 100000">
    </div>
    <button class="btn-primary" onclick="addRecord()">Add Entry</button>
    <table id="recordsTable">
      <tr>
        <th>Date & Time</th>
        <th>Name</th>
        <th>Quantity</th>
        <th>Actions</th>
      </tr>
    </table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
